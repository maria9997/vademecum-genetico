<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vademécum Genético y MIPRES - INVIMA / VND</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="app-header">
        <div class="header-container">
            <div class="logo">
                <img src="logo.png" alt="Genética Médica Logo" style="width: 52px; height: auto; object-fit: contain;">
                <div class="logo-text">
                    <h1>Vademécum Genético</h1>
                    <span>Directorio Clínico y Motor MIPRES (INVIMA / VND)</span>
                </div>
            </div>
        </div>
    </header>

    <main class="app-layout">
        <!-- Sidebar Filters -->
        <aside class="sidebar" id="sidebar">
            <h3 class="sidebar-title"><i data-lucide="filter"></i> Filtros de Especialidad</h3>
            <div class="filter-group" id="category-filters">
                <!-- Checkboxes will be rendered here -->
            </div>
            
            <h3 class="sidebar-title" style="margin-top: 1.5rem;"><i data-lucide="shield-check"></i> Estado Regulatorio</h3>
            <div class="filter-group">
                <label class="filter-label">
                    <input type="checkbox" value="INVIMA_MIPRES" class="status-filter">
                    INVIMA Vigente
                </label>
                <label class="filter-label">
                    <input type="checkbox" value="VITAL_NO_DISPONIBLE" class="status-filter">
                    Vital No Disponible (VND)
                </label>
            </div>
        </aside>

        <!-- Main Content (Omnibox + Results) -->
        <section class="main-content">
            <!-- Omnibox -->
            <div class="omnibox-container">
                <div class="omnibox">
                    <i data-lucide="search" class="search-icon"></i>
                    <input type="text" id="searchInput" placeholder="Búsqueda multicriterio: Medicamento, Principio Activo, CIE-10 o ATC..." autocomplete="off">
                    <button id="clearSearch" class="clear-btn" style="display: none;"><i data-lucide="x-circle"></i></button>
                </div>
            </div>

            <!-- Dashboard Stats / Info -->
            <div id="results-meta" class="results-meta">
                Mostrando <span id="results-count">0</span> medicamentos.
            </div>

            <!-- Grid de Medicamentos -->
            <div id="drugs-grid" class="drugs-grid">
                <!-- Drug Cards via JS -->
            </div>
            
            <!-- Footer / Autoría -->
            <footer class="app-footer">
                <div class="footer-content">
                    <p>Diseño y Desarrollo de Herramienta Clínica:</p>
                    <p class="author-name">Dra. María Paula Bernal Z.</p>
                    <p class="author-spec">Genética Médica</p>
                </div>
            </footer>
        </section>
    </main>

    <!-- Modal para Ficha Técnica Modular -->
    <div id="drug-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="modal-close" id="close-modal"><i data-lucide="x"></i></button>
            <div id="modal-body">
                <!-- Renderizado por JS -->
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="data/drugs.js"></script>
    <script src="app.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
